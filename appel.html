<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appel entrant</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b141a;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100vh;
}
/* NOM APPELANT */
.caller {
  text-align: center;
  margin-top: 80px;
}
.caller h1 {
  font-size: 28px;
  margin: 0;
}
.caller p {
  opacity: 0.7;
  margin-top: 10px;
}
/* ANIMATION */
.ring {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  margin: 40px auto;
  background: rgba(37, 211, 102, 0.2);
  position: relative;
}
.ring::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2px solid #25D366;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(1.8); opacity: 0; }
}
/* BOUTONS */
.actions {
  display: flex;
  justify-content: space-around;
  margin-bottom: 60px;
}
.btn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  cursor: pointer;
}
.accept {
  background: #25D366;
}
.reject {
  background: #ff3b30;
}
</style>
</head>
<body>
<div class="caller">
  <h1 id="callerName">Appel entrant</h1>
  <p>Appel vidéo...</p>
</div>
<div class="ring"></div>
<div class="actions">
  <div class="btn reject" onclick="rejectCall()">❌</div>
  <div class="btn accept" onclick="acceptCall()">📞</div>
</div>
<script>
// 🔥 RÉCUPÉRER PARAMÈTRES URL
const params = new URLSearchParams(window.location.search);
const callId = params.get("call");
const autoAnswer = params.get("autoanswer");
// SIMULATION NOM
document.getElementById("callerName").innerText = "Davi vous appelle";
// 🔊 SONNERIE
const audio = new Audio('/ringtone.mp3');
audio.loop = true;
audio.play().catch(()=>{});
// 📞 RÉPONDRE
function acceptCall() {
  audio.pause();
  startWebRTC();
}
// ❌ REFUSER
function rejectCall() {
  audio.pause();
  window.location.href = "/";
}
// 🚀 AUTO ANSWER
if (autoAnswer === "1") {
  setTimeout(() => {
    startWebRTC();
  }, 500);
}
// 👉 ICI TU CONNECTES TON WEBRTC
function startWebRTC() {
  console.log("Connexion WebRTC avec callId:", callId);
  // 👉 TON CODE EXISTANT ICI
}
</script>
</body>
</html>
